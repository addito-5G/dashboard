<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ba37a"/>
      <stop offset="100%" stop-color="#3d8a5c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="300" rx="8" fill="#1e120b"/>
  <rect x="1" y="1" width="478" height="298" rx="7" fill="none" stroke="#3a2518" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="480" height="32" rx="8" fill="#2a1810"/>
  <rect x="0" y="16" width="480" height="16" fill="#2a1810"/>
  <circle cx="16" cy="16" r="5" fill="#d4553a" opacity="0.8"/>
  <circle cx="32" cy="16" r="5" fill="#e8a849" opacity="0.8"/>
  <circle cx="48" cy="16" r="5" fill="#5ba37a" opacity="0.8"/>
  <text x="240" y="20" text-anchor="middle" fill="#c9a87a" font-family="Georgia, serif" font-size="11" font-weight="bold">Semantic Layer — Metrics Catalog</text>

  <!-- Badge: Single Source of Truth -->
  <rect x="316" y="42" width="152" height="20" rx="10" fill="url(#badgeGrad)" opacity="0.9"/>
  <text x="326" y="55" fill="#fff" font-family="Helvetica, sans-serif" font-size="8" font-weight="bold">Single Source of Truth</text>
  <circle cx="456" cy="52" r="6" fill="#fff" opacity="0.2"/>
  <text x="456" y="55" text-anchor="middle" fill="#fff" font-family="Helvetica, sans-serif" font-size="8">&#x2713;</text>

  <!-- Search bar -->
  <rect x="12" y="42" width="296" height="20" rx="4" fill="#261710" stroke="#3a2518" stroke-width="0.5"/>
  <text x="30" y="55" fill="#5a4030" font-family="Helvetica, sans-serif" font-size="9">Search metrics...</text>
  <!-- Search icon -->
  <circle cx="20" cy="52" r="4" fill="none" stroke="#5a4030" stroke-width="1"/>
  <line x1="23" y1="55" x2="26" y2="58" stroke="#5a4030" stroke-width="1"/>

  <!-- Table container -->
  <rect x="12" y="70" width="456" height="218" rx="6" fill="#261710" filter="url(#shadow2)"/>
  <rect x="12" y="70" width="456" height="218" rx="6" fill="none" stroke="#3a2518" stroke-width="0.5"/>

  <!-- Table header -->
  <rect x="12" y="70" width="456" height="26" rx="6" fill="#2a1810"/>
  <rect x="12" y="84" width="456" height="12" fill="#2a1810"/>
  <text x="28" y="87" fill="#c9a87a" font-family="Georgia, serif" font-size="9" font-weight="bold">Metric Name</text>
  <text x="148" y="87" fill="#c9a87a" font-family="Georgia, serif" font-size="9" font-weight="bold">Formula</text>
  <text x="298" y="87" fill="#c9a87a" font-family="Georgia, serif" font-size="9" font-weight="bold">Description</text>
  <text x="438" y="87" fill="#c9a87a" font-family="Georgia, serif" font-size="9" font-weight="bold">Used</text>

  <!-- Vertical separators -->
  <line x1="140" y1="74" x2="140" y2="284" stroke="#3a2518" stroke-width="0.5"/>
  <line x1="290" y1="74" x2="290" y2="284" stroke="#3a2518" stroke-width="0.5"/>
  <line x1="428" y1="74" x2="428" y2="284" stroke="#3a2518" stroke-width="0.5"/>

  <!-- Row 1: Revenue -->
  <rect x="14" y="97" width="452" height="40" rx="0" fill="#1e120b" opacity="0.5"/>
  <circle cx="24" cy="117" r="4" fill="#e8a849" opacity="0.6"/>
  <text x="34" y="112" fill="#e8d5b5" font-family="Helvetica, sans-serif" font-size="10" font-weight="bold">Revenue</text>
  <text x="34" y="126" fill="#7a6050" font-family="Menlo, monospace" font-size="7">revenue</text>
  <text x="148" y="112" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">SUM(</text>
  <text x="148" y="126" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">  orders.amount</text>
  <text x="148" y="132" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">)</text>
  <text x="298" y="112" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">Total revenue from</text>
  <text x="298" y="126" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">confirmed orders</text>
  <text x="448" y="117" text-anchor="middle" fill="#5ba37a" font-family="Menlo, monospace" font-size="9" font-weight="bold">24</text>

  <!-- Horizontal separator -->
  <line x1="14" y1="138" x2="466" y2="138" stroke="#3a2518" stroke-width="0.3"/>

  <!-- Row 2: Conversion Rate -->
  <circle cx="24" cy="157" r="4" fill="#d4553a" opacity="0.6"/>
  <text x="34" y="152" fill="#e8d5b5" font-family="Helvetica, sans-serif" font-size="10" font-weight="bold">Conversion Rate</text>
  <text x="34" y="166" fill="#7a6050" font-family="Menlo, monospace" font-size="7">conversion_rate</text>
  <text x="148" y="152" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">orders /</text>
  <text x="148" y="166" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">  sessions * 100</text>
  <text x="298" y="152" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">% of sessions that</text>
  <text x="298" y="166" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">result in a purchase</text>
  <text x="448" y="157" text-anchor="middle" fill="#5ba37a" font-family="Menlo, monospace" font-size="9" font-weight="bold">18</text>

  <!-- Horizontal separator -->
  <line x1="14" y1="178" x2="466" y2="178" stroke="#3a2518" stroke-width="0.3"/>

  <!-- Row 3: DAU (highlighted/selected) -->
  <rect x="14" y="179" width="452" height="40" rx="0" fill="#e8a849" opacity="0.06"/>
  <rect x="12" y="179" width="3" height="40" fill="#e8a849" rx="1"/>
  <circle cx="24" cy="199" r="4" fill="#4a8bbf" opacity="0.6"/>
  <text x="34" y="194" fill="#e8d5b5" font-family="Helvetica, sans-serif" font-size="10" font-weight="bold">DAU</text>
  <text x="34" y="208" fill="#7a6050" font-family="Menlo, monospace" font-size="7">daily_active_users</text>
  <text x="148" y="194" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">COUNT(DISTINCT</text>
  <text x="148" y="208" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">  events.user_id)</text>
  <text x="298" y="194" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">Unique users with</text>
  <text x="298" y="208" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">at least 1 event/day</text>
  <text x="448" y="199" text-anchor="middle" fill="#5ba37a" font-family="Menlo, monospace" font-size="9" font-weight="bold">31</text>

  <!-- Horizontal separator -->
  <line x1="14" y1="220" x2="466" y2="220" stroke="#3a2518" stroke-width="0.3"/>

  <!-- Row 4: Retention -->
  <circle cx="24" cy="240" r="4" fill="#8b6bb5" opacity="0.6"/>
  <text x="34" y="235" fill="#e8d5b5" font-family="Helvetica, sans-serif" font-size="10" font-weight="bold">D7 Retention</text>
  <text x="34" y="249" fill="#7a6050" font-family="Menlo, monospace" font-size="7">retention_d7</text>
  <text x="148" y="235" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">active_d7 /</text>
  <text x="148" y="249" fill="#c9a87a" font-family="Menlo, monospace" font-size="8">  cohort_size</text>
  <text x="298" y="235" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">% users returning</text>
  <text x="298" y="249" fill="#a08a70" font-family="Helvetica, sans-serif" font-size="8">after 7 days</text>
  <text x="448" y="240" text-anchor="middle" fill="#5ba37a" font-family="Menlo, monospace" font-size="9" font-weight="bold">12</text>

  <!-- Horizontal separator -->
  <line x1="14" y1="260" x2="466" y2="260" stroke="#3a2518" stroke-width="0.3"/>

  <!-- Footer -->
  <text x="28" y="278" fill="#5a4030" font-family="Menlo, monospace" font-size="7">4 metrics defined</text>
  <text x="240" y="278" text-anchor="middle" fill="#5a4030" font-family="Menlo, monospace" font-size="7">|</text>
  <text x="260" y="278" fill="#5a4030" font-family="Menlo, monospace" font-size="7">85 total references across dashboards</text>

  <!-- Pagination dots -->
  <circle cx="430" cy="276" r="3" fill="#e8a849"/>
  <circle cx="442" cy="276" r="3" fill="#3a2518"/>
  <circle cx="454" cy="276" r="3" fill="#3a2518"/>
</svg>